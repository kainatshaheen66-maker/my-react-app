/* HEADER */
.cart-drawer-header {

/* BODY */
.cart-drawer-body {

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: 1999;

.admin-container {

/* =========================
   STATS GRID
========================= */
.admin-stats {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  margin-bottom: 35px;
}

.stat-card {
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(10px);
  padding: 25px 18px;
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  text-align: center;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: "";
  position: absolute;
  width: 120px;
  height: 120px;
  background: rgba(255,136,0,0.08);
  border-radius: 50%;
  top: -50px;
  right: -40px;
}

.stat-card:hover {
  transform: translateY(-6px) scale(1.02);
}

  font-size: 16px;
  color: #555;
  margin-bottom: 10px;
}

  font-size: 30px;
  font-weight: bold;
  color: #ff8800;
}

/* CHECKOUT MODAL */
.checkout-modal {
  position: fixed;
  inset: 0;

  background: rgba(0,0,0,0.5);

  display: flex;
  justify-content: center;
  align-items: center;

  z-index: 3000;

  padding: 20px;
}

/* FORM */
.checkout-form {
  width: 100%;
  max-width: 420px;

  background: white;

  padding: 28px;

  border-radius: 22px;

  position: relative;

  display: flex;
  flex-direction: column;

  gap: 14px;

  box-sizing: border-box;

  animation: popup 0.3s ease;
}

/* CLOSE BUTTON */
.close-form-btn {
  position: absolute;

  top: 12px;
  right: 12px;

  width: 34px;
  height: 34px;

  border: none;

  border-radius: 50%;

  background: #fff3eb;

  color: #ff6600;

  font-size: 18px;
  font-weight: bold;

  cursor: pointer;

  transition: 0.3s ease;
}

.close-form-btn:hover {
  background: #ff6600;
  color: white;
  transform: rotate(90deg);
}

/* INPUTS */
.checkout-form input,
.checkout-form textarea {
  width: 100%;

  padding: 14px;

  border: 2px solid #ffe1cc;

  border-radius: 12px;

  font-size: 15px;

  outline: none;

  box-sizing: border-box;
}

/* TEXTAREA */
.checkout-form textarea {
  resize: none;
  min-height: 100px;
}

/* FOCUS */
.checkout-form input:focus,
.checkout-form textarea:focus {
  border-color: #ff8800;
}

/* BUTTON */
.checkout-form button[type="submit"] {
  border: none;

  background: linear-gradient(135deg, #ff8800, #ff9966);

  color: white;

  padding: 14px;

  border-radius: 14px;

  font-size: 16px;
  font-weight: bold;

  cursor: pointer;

  transition: 0.3s ease;
}

.checkout-form button[type="submit"]:hover {
  transform: translateY(-2px);
}

/* ANIMATION */
@keyframes popup {

  from {
    opacity: 0;
    transform: scale(0.8);
  }

  to {
    opacity: 1;
    transform: scale(1);
  }
}
